<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VisionOS Sandbox App</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f1525;
        color: #e8ecf4;
        margin: 0;
        padding: 24px;
      }
      button {
        margin-top: 12px;
        padding: 8px 14px;
        border: 0;
        border-radius: 6px;
        background: #6c5ce7;
        color: white;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Hello from VisionOS</h1>
    <p id="out">Counter: 0</p>
    <button id="inc">Increment (storage)</button>
    <script>
      const out = document.getElementById('out');
      const key = 'counter';
      visionOS.storage.get(key).then((v) => {
        const n = Number(v ?? 0);
        out.textContent = 'Counter: ' + n;
        document.getElementById('inc').onclick = async () => {
          const next = n + 1;
          await visionOS.storage.set(key, next);
          out.textContent = 'Counter: ' + next;
        };
      });
    </script>
  </body>
</html>
