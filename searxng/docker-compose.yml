# Local SearXNG for VisionOS research / web_search.
# Docs: https://docs.searxng.org/admin/installation-docker.html

name: visionos-searxng

services:
  searxng:
    container_name: visionos-searxng
    image: ${SEARXNG_IMAGE:-docker.io/searxng/searxng:${SEARXNG_VERSION:-latest}}
    # "no" avoids Podman/crun ghost containers when dev scripts recreate the service.
    restart: "no"
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    volumes:
      - ./core-config:/etc/searxng
      - searxng-data:/var/cache/searxng
    environment:
      - SEARXNG_BASE_URL=http://localhost:${SEARXNG_PORT:-8080}/

volumes:
  searxng-data:
