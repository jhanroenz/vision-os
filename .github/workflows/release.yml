name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            platform: linux
            arch: x64
            bundles: appimage,deb
            rust_target: ''
          - os: windows-latest
            platform: win32
            arch: x64
            bundles: nsis
            rust_target: ''
          - os: macos-latest
            platform: darwin
            arch: arm64
            bundles: dmg
            rust_target: ''

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            xz-utils \
            git \
            build-essential \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            libffi-dev \
            libfuse2 \
            file

      - name: Install Windows build dependencies
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci

      - name: Stage portable runtime
        shell: bash
        run: |
          npm run prepare:bundle
          node scripts/download-node.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          node scripts/download-python.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          node scripts/prepare-searxng-python.mjs

      - name: Verify bundle contains no secrets or dev databases
        run: node scripts/verify-bundle-secrets.mjs

      - name: Build Tauri release
        env:
          NO_STRIP: ${{ matrix.os == 'ubuntu-24.04' && 'true' || '' }}
        run: npm run tauri:build:raw -- --config src-tauri/tauri.bundle.conf.json --bundles ${{ matrix.bundles }}

      - name: Upload Linux portable artifacts
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v4
        with:
          name: visionos-linux-portable
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30

      - name: Upload Windows portable artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: visionos-windows-portable
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/*.exe
          retention-days: 30

      - name: Upload macOS portable artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: visionos-macos-portable
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: visionos-*-portable
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
