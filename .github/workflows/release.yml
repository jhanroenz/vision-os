name: Release

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux (.deb + .tar.gz + optional AppImage)'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows (NSIS installer)'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS (DMG)'
        type: boolean
        default: true
      create_release:
        description: 'Upload artifacts to a GitHub Release'
        type: boolean
        default: true
      release_tag:
        description: 'Release tag (default: v + package.json version, e.g. v0.1.1)'
        type: string
        required: false
        default: ''
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - id: set-matrix
        run: |
          set -euo pipefail
          MATRIX='[]'
          if [ "${{ github.event_name }}" = "push" ]; then
            BUILD_LINUX=true
            BUILD_WINDOWS=true
            BUILD_MACOS=true
          else
            BUILD_LINUX=${{ inputs.build_linux }}
            BUILD_WINDOWS=${{ inputs.build_windows }}
            BUILD_MACOS=${{ inputs.build_macos }}
          fi
          if [ "$BUILD_LINUX" = "true" ]; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"os":"ubuntu-24.04","platform":"linux","arch":"x64","bundles":"deb"}]')
          fi
          if [ "$BUILD_WINDOWS" = "true" ]; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"os":"windows-latest","platform":"win32","arch":"x64","bundles":"nsis"}]')
          fi
          if [ "$BUILD_MACOS" = "true" ]; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"os":"macos-latest","platform":"darwin","arch":"arm64","bundles":"dmg"}]')
          fi
          echo "include=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = '[]' ]; then
            echo 'No platforms selected — enable at least one build_* input.' >&2
            exit 1
          fi

  build:
    needs: matrix-prep
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix-prep.outputs.include) }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            xz-utils \
            git \
            build-essential \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            libffi-dev \
            libfuse2 \
            file

      - name: Install Windows build dependencies
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci

      - name: Stage portable runtime
        shell: bash
        run: |
          npm run prepare:bundle
          node scripts/download-node.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          node scripts/download-python.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          node scripts/prepare-searxng-python.mjs

      - name: Verify bundle contains no secrets or dev databases
        run: node scripts/verify-bundle-secrets.mjs

      - name: Build Tauri release
        run: npm run tauri:build:raw -- --config src-tauri/tauri.bundle.conf.json --bundles ${{ matrix.bundles }}

      - name: Build Linux AppImage (optional)
        if: matrix.os == 'ubuntu-24.04'
        continue-on-error: true
        env:
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          npm run tauri:build:raw -- --config src-tauri/tauri.bundle.conf.json --bundles appimage --verbose

      - name: Build Linux tar.gz with install script
        if: matrix.os == 'ubuntu-24.04'
        run: bash scripts/build-linux-tarball.sh

      - name: Upload Linux portable artifacts
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: visionos-linux-portable
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/tarball/*.tar.gz
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Windows portable artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: visionos-windows-portable
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/*.exe
          retention-days: 30

      - name: Upload macOS portable artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: visionos-macos-portable
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30

  release:
    if: |
      needs.build.result == 'success' && (
        startsWith(github.ref, 'refs/tags/v') ||
        (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
      )
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          pattern: visionos-*-portable
          merge-multiple: true
          path: dist

      - name: Resolve release tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.release_tag }}" ]; then
            TAG="${{ inputs.release_tag }}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "name=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          target_commitish: ${{ github.sha }}
          files: dist/**
          generate_release_notes: true
