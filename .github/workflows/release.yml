name: Release

# Manual runs only while iterating on Windows packaging.
# Re-enable `push: tags` when all platforms are green.
on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux (.deb + optional AppImage)'
        type: boolean
        default: false
      build_windows:
        description: 'Build Windows (NSIS installer)'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS (DMG)'
        type: boolean
        default: false
      create_release:
        description: 'Upload artifacts to a GitHub Release (requires a tag ref)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  matrix-prep:
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.set-matrix.outputs.include }}
    steps:
      - id: set-matrix
        run: |
          set -euo pipefail
          MATRIX='[]'
          if [ "${{ inputs.build_linux }}" = "true" ]; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"os":"ubuntu-24.04","platform":"linux","arch":"x64","bundles":"deb"}]')
          fi
          if [ "${{ inputs.build_windows }}" = "true" ]; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"os":"windows-latest","platform":"win32","arch":"x64","bundles":"nsis"}]')
          fi
          if [ "${{ inputs.build_macos }}" = "true" ]; then
            MATRIX=$(echo "$MATRIX" | jq -c '. + [{"os":"macos-latest","platform":"darwin","arch":"arm64","bundles":"dmg"}]')
          fi
          echo "include=$MATRIX" >> "$GITHUB_OUTPUT"
          if [ "$MATRIX" = '[]' ]; then
            echo 'No platforms selected — enable at least one build_* input.' >&2
            exit 1
          fi

  build:
    needs: matrix-prep
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix-prep.outputs.include) }}

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          package-manager-cache: false

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            xz-utils \
            git \
            build-essential \
            libxml2-dev \
            libxslt1-dev \
            zlib1g-dev \
            libffi-dev \
            libfuse2 \
            file

      - name: Install Windows build dependencies
        if: matrix.os == 'windows-latest'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install dependencies
        run: npm ci

      - name: Stage portable runtime
        shell: bash
        run: |
          npm run prepare:bundle
          node scripts/download-node.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          node scripts/download-python.mjs --platform ${{ matrix.platform }} --arch ${{ matrix.arch }}
          node scripts/prepare-searxng-python.mjs

      - name: Verify bundle contains no secrets or dev databases
        run: node scripts/verify-bundle-secrets.mjs

      - name: Build Tauri release
        run: npm run tauri:build:raw -- --config src-tauri/tauri.bundle.conf.json --bundles ${{ matrix.bundles }}

      - name: Build Linux AppImage (optional)
        if: matrix.os == 'ubuntu-24.04'
        continue-on-error: true
        env:
          NO_STRIP: true
          APPIMAGE_EXTRACT_AND_RUN: 1
        run: |
          npm run tauri:build:raw -- --config src-tauri/tauri.bundle.conf.json --bundles appimage --verbose

      - name: Upload Linux portable artifacts
        if: matrix.os == 'ubuntu-24.04'
        uses: actions/upload-artifact@v7
        with:
          name: visionos-linux-portable
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Windows portable artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: visionos-windows-portable
          path: |
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/release/*.exe
          retention-days: 30

      - name: Upload macOS portable artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: visionos-macos-portable
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app
          retention-days: 30

  release:
    if: inputs.create_release == true
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v8
        with:
          pattern: visionos-*-portable
          merge-multiple: true
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
